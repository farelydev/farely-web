services:
  - type: web
    name: farely
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: AMADEUS_CLIENT_ID
        sync: false
      - key: AMADEUS_CLIENT_SECRET
        sync: false
      - key: AMADEUS_HOSTNAME
        value: test
      - key: USE_DEMO_FALLBACK
        value: true
      - key: FLIGHT_DEAL_PARTNER
        value: travelpayouts
      - key: TRAVELPAYOUTS_MARKER
        sync: false
      - key: TRAVELPAYOUTS_HOST
        value: www.aviasales.com
      - key: TRAVELPAYOUTS_SUB_ID
        value: farely-render
      - key: FLIGHT_AFFILIATE_URL
        value: ""
      - key: ADMIN_ANALYTICS_TOKEN
        sync: false
      - key: VITE_CONTACT_EMAIL
        sync: false
      - key: VITE_SUPPORT_EMAIL
        value: support@tryfarely.com
      - key: VITE_NOREPLY_EMAIL
        value: noreply@tryfarely.com
      - key: RESEND_API_KEY
        sync: false
      - key: PUBLIC_SUPPORT_EMAIL
        value: support@tryfarely.com
      - key: SUPPORT_TO_EMAIL
        value: info@tryfarely.com
      - key: SUPPORT_FROM_EMAIL
        value: Farely Support <support@tryfarely.com>
